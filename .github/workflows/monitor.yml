name: Oka Flood Monitor

on:
  schedule:
    - cron: '0 2 * * *'    # 05:00 МСК
    - cron: '0 5 * * *'    # 08:00 МСК
    - cron: '0 10 * * *'   # 13:00 МСК
    - cron: '0 15 * * *'   # 18:00 МСК
    - cron: '0 19 * * *'   # 22:00 МСК
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor v7
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_GROUP_ID: ${{ secrets.TG_GROUP_ID }}
          TG_NEIGHBORS_ID: ${{ secrets.TG_NEIGHBORS }}
          TG_CHAT_ZMSS: ${{ secrets.TG_CHAT_ZMSS }}
          CHAT_ADMIN: ${{ secrets.CHAT_ADMIN }}
          CHAT_PERSONAL_GROUP: ${{ secrets.CHAT_PERSONAL_GROUP }}
        run: python monitor_v7.py

      - name: Commit HTML/data
        run: |
          git config user.name "OkaBot"
          git config user.email "bot@oka.flood"
          git config http.postBuffer 524288000
          git add docs/ data/
          git stash
          git pull --rebase origin main
          git stash pop
          git add -A
          git diff-index --quiet HEAD || git commit -m "update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
