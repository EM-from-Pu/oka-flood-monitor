name: Oka Flood Monitor

on:
  schedule:
    - cron: '0 5 * * *'    # 08:00 МСК (UTC+3)
    - cron: '0 9 * * *'    # 12:00 МСК
    - cron: '0 14 * * *'   # 17:00 МСК
    - cron: '0 17 * * *'   # 20:00 МСК
  workflow_dispatch:        # ручной запуск кнопкой Run workflow

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_GROUP_ID: ${{ secrets.TG_GROUP_ID }}
          TG_NEIGHBORS_ID: ${{ secrets.TG_NEIGHBORS }}
          TG_CHAT_ZMSS: ${{ secrets.TG_CHAT_ZMSS }}
          CHAT_ADMIN: ${{ secrets.CHAT_ADMIN }}
          CHAT_PERSONAL_GROUP: ${{ secrets.CHAT_PERSONAL_GROUP }}
        run: python monitor.py

      - name: Commit HTML/data
        run: |
          git config user.name "OkaBot"
          git config user.email "bot@oka.flood"
          git add docs/ data/ || true
          git diff-index --quiet HEAD || git commit -m "update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
